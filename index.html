<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetoLS Finance PRO</title>

<!-- CHART -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI';
  background: #0f172a;
  color: #fff;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 15px;
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

input, select, button {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 10px;
  border: none;
}

button {
  background: linear-gradient(45deg,#22c55e,#16a34a);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.hidden { display:none; }

.metric {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
}

.green { color:#4ade80 }
.red { color:#f87171 }
.blue { color:#60a5fa }

h2 { text-align:center }
</style>
</head>

<body>

<!-- LOGIN -->
<div class="container" id="loginBox">
  <div class="card">
    <h2>Login</h2>
    <input id="user" placeholder="Usuário">
    <input id="pass" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
    <button onclick="abrirRegistro()">Criar conta</button>
  </div>
</div>

<!-- REGISTRO -->
<div class="container hidden" id="registerBox">
  <div class="card">
    <h2>Cadastrar</h2>
    <input id="newUser">
    <input id="newPass" type="password">
    <button onclick="registrar()">Cadastrar</button>
    <button onclick="voltarLogin()">Voltar</button>
  </div>
</div>

<!-- APP -->
<div class="container hidden" id="appScreen">

  <div class="card">
    <h2>Dashboard</h2>

    <input type="date" id="dataInicio">
    <input type="date" id="dataFim">

    <button onclick="filtrar()">Filtrar</button>
  </div>

  <div class="card">
    <input id="valor" type="number" placeholder="Valor">
    <input id="descricao" placeholder="Descrição">
    <input id="data" type="date">
    <select id="tipo">
      <option value="receber">Receita</option>
      <option value="pagar">Despesa</option>
    </select>
    <button onclick="add()">Adicionar</button>
  </div>

  <div class="card">
    <div class="metric">Receitas <span class="green" id="receitas"></span></div>
    <div class="metric">Despesas <span class="red" id="despesas"></span></div>
    <div class="metric">Saldo <span class="blue" id="saldo"></span></div>
  </div>

  <div class="card">
    <canvas id="grafico"></canvas>
  </div>

  <button onclick="logout()">Sair</button>
</div>

<script>
let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
let dados = JSON.parse(localStorage.getItem("dados")) || [];
let usuarioLogado = localStorage.getItem("usuarioLogado");
let chart;

// AUTO LOGIN
if(usuarioLogado){
  loginSucesso();
}

// LOGIN
function login(){
  const u = user.value;
  const p = pass.value;

  const ok = usuarios.find(x=>x.user===u && x.pass===p);
  if(ok){
    localStorage.setItem("usuarioLogado",u);
    loginSucesso();
  } else alert("Erro");
}

// REGISTRO
function registrar(){
  usuarios.push({user:newUser.value, pass:newPass.value});
  localStorage.setItem("usuarios", JSON.stringify(usuarios));
  alert("Criado!");
  voltarLogin();
}

// TROCAS
function abrirRegistro(){
  loginBox.classList.add("hidden");
  registerBox.classList.remove("hidden");
}

function voltarLogin(){
  registerBox.classList.add("hidden");
  loginBox.classList.remove("hidden");
}

function loginSucesso(){
  loginBox.classList.add("hidden");
  appScreen.classList.remove("hidden");
  render();
}

// LOGOUT
function logout(){
  localStorage.removeItem("usuarioLogado");
  location.reload();
}

// ADD
function add(){
  dados.push({
    user:usuarioLogado,
    valor:Number(valor.value),
    tipo:tipo.value,
    data:data.value,
    desc:descricao.value
  });
  salvar();
  render();
}

// FILTRO
function filtrar(){
  render(dataInicio.value, dataFim.value);
}

// RENDER
function render(inicio, fim){
  let lista = dados.filter(d=>d.user===usuarioLogado);

  if(inicio && fim){
    lista = lista.filter(d=> d.data >= inicio && d.data <= fim);
  }

  const receitas = lista.filter(d=>d.tipo==="receber").reduce((s,d)=>s+d.valor,0);
  const despesas = lista.filter(d=>d.tipo==="pagar").reduce((s,d)=>s+d.valor,0);

  receitasEl.innerText = "R$ " + receitas;
  despesasEl.innerText = "R$ " + despesas;
  saldoEl.innerText = "R$ " + (receitas-despesas);

  // GRAFICO
  if(chart) chart.destroy();

  chart = new Chart(grafico, {
    type:'doughnut',
    data:{
      labels:["Receitas","Despesas"],
      datasets:[{
        data:[receitas,despesas],
        backgroundColor:["#22c55e","#ef4444"]
      }]
    }
  });
}

// SALVAR
function salvar(){
  localStorage.setItem("dados", JSON.stringify(dados));
}
</script>

</body>
</html>
