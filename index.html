<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetoLS Finance</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0a0a">

  <style>
    body {
      font-family: Arial;
      background: #0a0a0a;
      color: #fff;
      margin: 0;
    }

    .container {
      padding: 20px;
      max-width: 400px;
      margin: auto;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border-radius: 8px;
      border: none;
      font-size: 14px;
    }

    button {
      background: #00c853;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }

    .hidden {
      display: none;
    }

    .metric {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 10px;
      margin-top: 10px;
    }

    .green { color: #00e676; }
    .red { color: #ff5252; }
    .blue { color: #40c4ff; }
  </style>
</head>

<body>

<!-- LOGIN -->
<div class="container" id="loginBox">
  <h2>Login</h2>
  <input id="user" placeholder="Usuário">
  <input id="pass" type="password" placeholder="Senha">
  <button onclick="login()">Entrar</button>
  <button onclick="abrirRegistro()">Criar conta</button>
</div>

<!-- REGISTRO -->
<div class="container hidden" id="registerBox">
  <h2>Criar Conta</h2>
  <input id="newUser" placeholder="Novo usuário">
  <input id="newPass" type="password" placeholder="Nova senha">
  <button onclick="registrar()">Cadastrar</button>
  <button onclick="voltarLogin()">Voltar</button>
</div>

<!-- APP -->
<div class="container hidden" id="appScreen">
  <h2>NetoLS Finance</h2>

  <input id="valor" type="number" placeholder="Valor">

  <select id="tipo">
    <option value="receber">Receber</option>
    <option value="pagar">Pagar</option>
  </select>

  <button onclick="add()">Adicionar</button>

  <div id="metrics"></div>

  <button onclick="logout()">Sair</button>
</div>

<script>
let dados = JSON.parse(localStorage.getItem("dados")) || [];
let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
let usuarioLogado = localStorage.getItem("usuarioLogado");

// AUTO LOGIN
if (usuarioLogado) {
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("appScreen").classList.remove("hidden");
  render();
}

// ABRIR REGISTRO
function abrirRegistro() {
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("registerBox").classList.remove("hidden");
}

// VOLTAR LOGIN
function voltarLogin() {
  document.getElementById("registerBox").classList.add("hidden");
  document.getElementById("loginBox").classList.remove("hidden");
}

// REGISTRAR
function registrar() {
  const user = document.getElementById("newUser").value;
  const pass = document.getElementById("newPass").value;

  if (!user || !pass) {
    alert("Preencha tudo");
    return;
  }

  if (usuarios.find(u => u.user === user)) {
    alert("Usuário já existe");
    return;
  }

  usuarios.push({ user, pass });
  localStorage.setItem("usuarios", JSON.stringify(usuarios));

  alert("Conta criada!");
  voltarLogin();
}

// LOGIN
function login() {
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  const encontrado = usuarios.find(user => user.user === u && user.pass === p);

  if (encontrado) {
    localStorage.setItem("usuarioLogado", u);

    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("appScreen").classList.remove("hidden");

    render();
  } else {
    alert("Usuário ou senha inválidos");
  }
}

// LOGOUT
function logout() {
  localStorage.removeItem("usuarioLogado");
  location.reload();
}

// ADICIONAR
function add() {
  const valor = document.getElementById("valor").value;
  const tipo = document.getElementById("tipo").value;

  if (!valor) return alert("Digite um valor");

  dados.push({
    valor: Number(valor),
    tipo,
    user: usuarioLogado
  });

  localStorage.setItem("dados", JSON.stringify(dados));

  render();
}

// RENDER
function render() {
  const userDados = dados.filter(d => d.user === usuarioLogado);

  const receber = userDados.filter(d => d.tipo === "receber");
  const pagar = userDados.filter(d => d.tipo === "pagar");

  const totalReceber = receber.reduce((s, d) => s + d.valor, 0);
  const totalPagar = pagar.reduce((s, d) => s + d.valor, 0);
  const saldo = totalReceber - totalPagar;

  document.getElementById("metrics").innerHTML = `
    <div class="metric">
      Receber: <span class="green">R$ ${totalReceber}</span>
    </div>

    <div class="metric">
      Pagar: <span class="red">R$ ${totalPagar}</span>
    </div>

    <div class="metric">
      Saldo: <span class="${saldo >= 0 ? 'blue' : 'red'}">R$ ${saldo}</span>
    </div>
  `;
}

// SERVICE WORKER
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
