<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <!-- MOBILE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>FinanceApp</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="apple-touch-icon" href="icon-192.png">

  <!-- ESTILO -->
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0a0a0a;
      color: white;
      -webkit-user-select: none;
      user-select: none;
    }

    * {
      -webkit-tap-highlight-color: transparent;
    }

    header {
      padding: 20px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #00c853;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    /* Splash */
    #splash {
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-size: 22px;
    }
  </style>
</head>

<body>

<!-- Splash -->
<div id="splash">FinanceApp</div>

<header>💰 FinanceApp</header>

<div class="container">
  <button onclick="alert('Funcionando!')">Testar</button>
</div>

<!-- Botão instalar -->
<button id="btnInstall" style="position:fixed;bottom:20px;left:20px;display:none;">
  Instalar App
</button>

<script>
/* Splash */
window.addEventListener("load", () => {
  setTimeout(() => {
    document.getElementById("splash").style.display = "none";
  }, 800);
});

/* Service Worker */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js");
  });
}

/* Instalar App */
let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("btnInstall").style.display = "block";
});

document.getElementById("btnInstall").addEventListener("click", async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt = null;
  }
});
</script>

</body>
</html>
